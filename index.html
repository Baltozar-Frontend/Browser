<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STARK OS | Persistent Comm</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    
    <style>
        :root {
            --accent: #ff3b3b;
            --bg: #050505;
            --panel: #121212;
            --text: #e0e0e0;
            --border: #2a2a2a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HUD Эффекты */
        .header {
            padding: 15px 20px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .status { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); }
        
        /* Чат */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            animation: fadeIn 0.2s ease;
        }

        .msg.me {
            align-self: flex-end;
            background: rgba(255, 59, 59, 0.1);
            border-color: var(--accent);
            color: #fff;
        }

        .msg-time {
            font-size: 9px;
            opacity: 0.5;
            margin-top: 4px;
            display: block;
            text-align: right;
        }

        /* Поле ввода */
        .input-bar {
            padding: 15px;
            background: var(--panel);
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        input {
            flex: 1;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Окно авторизации (вместо ID) */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .setup-card {
            width: 100%;
            max-width: 320px;
        }

        .setup-card h2 { color: var(--accent); letter-spacing: 3px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="setup-card">
        <h2>STARK COMM</h2>
        <p style="font-size: 12px; opacity: 0.6;">ВВЕДИТЕ НАЗВАНИЕ КАНАЛА И ВАШ ПОЗЫВНОЙ</p>
        <input type="text" id="room-input" placeholder="Название комнаты" style="margin-bottom: 10px; width: 100%;">
        <input type="text" id="name-input" placeholder="Ваш позывной" style="margin-bottom: 20px; width: 100%;">
        <button onclick="initConnection()" style="width: 100%; padding: 15px;">АКТИВИРОВАТЬ КАНАЛ</button>
    </div>
</div>

<div class="header">
    <div class="status" id="status-text">OFFLINE</div>
    <div style="font-size: 12px; font-weight: bold;" id="display-room">NOT CONNECTED</div>
    <button onclick="clearHistory()" style="background: transparent; border: 1px solid gray; padding: 4px 8px; font-size: 10px;">CLEAR LOG</button>
</div>

<div id="chat-window"></div>

<div class="input-bar">
    <input type="text" id="msg-input" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">SEND</button>
</div>

<script>
    let peer = null;
    let conn = null;
    let myName = "";
    let roomName = "";
    let chatHistory = JSON.parse(localStorage.getItem('stark_chat_v1')) || [];

    // Загрузка истории при старте
    window.onload = () => {
        renderHistory();
        if (localStorage.getItem('stark_room')) {
            document.getElementById('room-input').value = localStorage.getItem('stark_room');
            document.getElementById('name-input').value = localStorage.getItem('stark_user');
        }
    };

    function initConnection() {
        roomName = document.getElementById('room-input').value.trim().toLowerCase();
        myName = document.getElementById('name-input').value.trim();

        if (!roomName || !myName) return alert("Заполните данные!");

        localStorage.setItem('stark_room', roomName);
        localStorage.setItem('stark_user', myName);

        // Создаем Peer с кастомным ID на основе комнаты
        // Чтобы два человека могли найти друг друга, один будет 'room_A', другой 'room_B'
        // Для простоты: пробуем подключиться к 'room_name_peer1', если занято — к 'room_name_peer2'
        
        peer = new Peer(roomName + '_host'); 

        peer.on('open', (id) => {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('status-text').innerText = "WAITING FOR PARTNER...";
            document.getElementById('display-room').innerText = roomName.toUpperCase();
            
            // Пытаемся автоматически подключиться к возможному гостю
            connectToPartner(roomName + '_guest');
        });

        peer.on('error', (err) => {
            if (err.type === 'id-taken') {
                // Если хост занят, заходим как гость
                peer = new Peer(roomName + '_guest');
                peer.on('open', () => {
                    document.getElementById('auth-overlay').classList.add('hidden');
                    document.getElementById('display-room').innerText = roomName.toUpperCase();
                    connectToPartner(roomName + '_host');
                });
                setupPeerEvents();
            }
        });

        setupPeerEvents();
    }

    function setupPeerEvents() {
        peer.on('connection', (c) => {
            conn = c;
            handleData();
        });
    }

    function connectToPartner(partnerId) {
        const tryConnect = setInterval(() => {
            if (conn) { clearInterval(tryConnect); return; }
            let c = peer.connect(partnerId);
            c.on('open', () => {
                conn = c;
                handleData();
                clearInterval(tryConnect);
            });
        }, 3000);
    }

    function handleData() {
        document.getElementById('status-text').innerText = "SECURE LINK ACTIVE";
        document.getElementById('status-text').style.color = "#00ff88";

        conn.on('data', (data) => {
            saveMessage(data.user, data.text, false);
        });

        conn.on('close', () => {
            document.getElementById('status-text').innerText = "LINK LOST - RECONNECTING...";
            document.getElementById('status-text').style.color = "var(--accent)";
            conn = null;
            initConnection(); // Авто-реконнект
        });
    }

    function send() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text) return;

        if (conn && conn.open) {
            conn.send({ user: myName, text: text });
            saveMessage(myName, text, true);
            input.value = "";
        } else {
            alert("Нет связи с собеседником. Ожидайте подключения.");
        }
    }

    function saveMessage(user, text, isMe) {
        const msgObj = { user, text, isMe, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
        chatHistory.push(msgObj);
        localStorage.setItem('stark_chat_v1', JSON.stringify(chatHistory));
        appendMessage(msgObj);
    }

    function renderHistory() {
        const win = document.getElementById('chat-window');
        win.innerHTML = "";
        chatHistory.forEach(m => appendMessage(m));
    }

    function appendMessage(m) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${m.isMe ? 'me' : ''}`;
        div.innerHTML = `
            <div style="font-size: 10px; font-weight: bold; margin-bottom: 4px; color: var(--accent)">${m.user}</div>
            <div>${m.text}</div>
            <span class="msg-time">${m.time}</span>
        `;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function clearHistory() {
        if(confirm("Удалить всю историю сообщений?")) {
            localStorage.removeItem('stark_chat_v1');
            chatHistory = [];
            renderHistory();
        }
    }

    // Регистрация простого Service Worker для работы оффлайн (PWA)
    if ('serviceWorker' in navigator) {
        const swCode = `
            self.addEventListener('install', e => e.waitUntil(caches.open('stark-v1').then(c => c.addAll(['/']))));
            self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
        `;
        const blob = new Blob([swCode], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
</script>
</body>
</html>
