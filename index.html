<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STARK Messenger</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #0b0b0d;
            --panel: #161618;
            --accent: #007aff;
            --text: #ffffff;
            --text-dim: #8e8e93;
            --border: #2c2c2e;
            --my-msg: #007aff;
            --their-msg: #3a3a3c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sb-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .my-id-tag {
            font-size: 12px;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .search-box {
            display: flex;
            gap: 8px;
        }

        input {
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
            width: 100%;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }

        .contact-item:hover { background: rgba(255,255,255,0.05); }
        .contact-item.active { background: rgba(0, 122, 255, 0.15); border-left: 3px solid var(--accent); }

        /* --- CHAT AREA --- */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .chat-header {
            padding: 15px 25px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bubble {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .bubble.me {
            align-self: flex-end;
            background: var(--my-msg);
            border-bottom-right-radius: 4px;
        }

        .bubble.them {
            align-self: flex-start;
            background: var(--their-msg);
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            padding: 20px;
            background: var(--panel);
            display: flex;
            gap: 12px;
        }

        /* --- AUTH OVERLAY --- */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            width: 100%;
            max-width: 300px;
            text-align: center;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="letter-spacing: 2px;">STARK OS</h2>
        <p style="color: var(--text-dim); font-size: 13px;">ВЫБЕРИТЕ УНИКАЛЬНЫЙ USERNAME</p>
        <input type="text" id="username-init" placeholder="Напр: TonyStark_1" style="margin-bottom: 15px;">
        <button onclick="login()" style="width: 100%;">ВОЙТИ В СИСТЕМУ</button>
    </div>
</div>

<div class="sidebar">
    <div class="sb-header">
        <div class="my-id-tag">ONLINE: <span id="my-display-name">...</span></div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Поиск пользователя...">
            <button onclick="startNewChat()">+</button>
        </div>
    </div>
    <div class="contact-list" id="contacts">
        </div>
</div>

<div class="main-chat">
    <div class="chat-header">
        <div id="active-contact-name">Выберите чат</div>
        <div id="status-indicator" style="font-size: 10px; color: var(--text-dim);">IDLE</div>
    </div>
    <div id="chat-messages"></div>
    <div class="chat-input-area">
        <input type="text" id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">SEND</button>
    </div>
</div>

<script>
    let peer = null;
    let connections = {}; // Храним активные соединения {username: conn}
    let myName = localStorage.getItem('stark_username');
    let activeChat = null;
    
    // Глобальная история { "user1": [msg1, msg2], "user2": [...] }
    let history = JSON.parse(localStorage.getItem('stark_history')) || {};

    if (myName) {
        showMain();
        initPeer();
    }

    function login() {
        const input = document.getElementById('username-init').value.trim();
        if (input.length < 3) return alert("Минимум 3 символа");
        myName = input;
        localStorage.setItem('stark_username', myName);
        showMain();
        initPeer();
    }

    function showMain() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('my-display-name').innerText = myName;
        renderContacts();
    }

    function initPeer() {
        // Создаем Peer с фиксированным ID = Username
        peer = new Peer(myName);

        peer.on('open', () => {
            console.log("Подключено к сети как:", myName);
        });

        // Слушаем входящие соединения
        peer.on('connection', (conn) => {
            setupConnEvents(conn);
        });

        peer.on('error', (err) => {
            if (err.type === 'id-taken') alert("Это имя уже занято!");
            console.error(err);
        });
    }

    function startNewChat() {
        const target = document.getElementById('search-input').value.trim();
        if (!target || target === myName) return;
        
        if (!history[target]) history[target] = [];
        openChat(target);
        document.getElementById('search-input').value = "";
    }

    function openChat(username) {
        activeChat = username;
        renderContacts();
        renderMessages();
        document.getElementById('active-contact-name').innerText = username;

        // Если нет активного соединения — пробуем подключиться
        if (!connections[username] || !connections[username].open) {
            const conn = peer.connect(username);
            setupConnEvents(conn);
        }
    }

    function setupConnEvents(conn) {
        conn.on('open', () => {
            connections[conn.peer] = conn;
            if (activeChat === conn.peer) {
                document.getElementById('status-indicator').innerText = "CONNECTED";
                document.getElementById('status-indicator').style.color = "#00ff88";
            }
        });

        conn.on('data', (data) => {
            saveMsg(conn.peer, data, false);
        });

        conn.on('close', () => {
            if (activeChat === conn.peer) {
                document.getElementById('status-indicator').innerText = "OFFLINE";
                document.getElementById('status-indicator').style.color = "gray";
            }
        });
    }

    function send() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text || !activeChat) return;

        const conn = connections[activeChat];
        if (conn && conn.open) {
            conn.send(text);
            saveMsg(activeChat, text, true);
            input.value = "";
        } else {
            // Если не в сети, просто сохраняем (друг получит, когда оба будете онлайн)
            alert("Пользователь сейчас оффлайн. Сообщение будет доставлено при подключении.");
            saveMsg(activeChat, text, true);
            input.value = "";
        }
    }

    function saveMsg(partner, text, isMe) {
        if (!history[partner]) history[partner] = [];
        history[partner].push({ text, isMe, time: Date.now() });
        localStorage.setItem('stark_history', JSON.stringify(history));
        
        if (activeChat === partner) renderMessages();
        renderContacts();
    }

    function renderContacts() {
        const list = document.getElementById('contacts');
        list.innerHTML = "";
        Object.keys(history).sort((a,b) => {
            const lastA = history[a][history[a].length-1]?.time || 0;
            const lastB = history[b][history[b].length-1]?.time || 0;
            return lastB - lastA;
        }).forEach(user => {
            const lastMsg = history[user][history[user].length-1]?.text || "Нет сообщений";
            const div = document.createElement('div');
            div.className = `contact-item ${activeChat === user ? 'active' : ''}`;
            div.innerHTML = `
                <div style="font-weight:bold">${user}</div>
                <div style="font-size:12px; color:var(--text-dim); overflow:hidden; white-space:nowrap; text-overflow:ellipsis">${lastMsg}</div>
            `;
            div.onclick = () => openChat(user);
            list.appendChild(div);
        });
    }

    function renderMessages() {
        const box = document.getElementById('chat-messages');
        box.innerHTML = "";
        if (!activeChat || !history[activeChat]) return;

        history[activeChat].forEach(m => {
            const div = document.createElement('div');
            div.className = `bubble ${m.isMe ? 'me' : 'them'}`;
            div.innerText = m.text;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    // Регистрация PWA
    if ('serviceWorker' in navigator) {
        const swCode = `
            self.addEventListener('install', e => e.waitUntil(caches.open('stark-v2').then(c => c.addAll(['/']))));
            self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
        `;
        const blob = new Blob([swCode], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
</script>
</body>
</html>
