<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STARK COMM | Secure Terminal</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        :root {
            --glow: #00f2ff;
            --bg: #050505;
            --panel: rgba(0, 242, 255, 0.05);
            --border: rgba(0, 242, 255, 0.2);
            --text: #b3fdff;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Эффект сетки и шума */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* HUD Header */
        .hud-header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel);
            backdrop-filter: blur(10px);
        }

        .status-tag {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--glow);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--glow);
            animation: blink 1s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Окно чата */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-left: 2px solid var(--glow);
            background: rgba(0, 242, 255, 0.03);
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .message.own {
            align-self: flex-end;
            border-left: none;
            border-right: 2px solid #ff0055;
            background: rgba(255, 0, 85, 0.03);
            color: #ffb3cc;
        }

        .msg-meta {
            font-size: 10px;
            opacity: 0.5;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        /* Панель ввода */
        .input-area {
            padding: 20px;
            background: var(--panel);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            padding: 12px;
            color: var(--glow);
            font-family: inherit;
            outline: none;
        }

        button {
            background: var(--glow);
            color: #000;
            border: none;
            padding: 0 20px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            box-shadow: 0 0 20px var(--glow);
            filter: brightness(1.2);
        }

        /* Панель подключения */
        .connection-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            border: 1px solid var(--glow);
            padding: 30px;
            z-index: 100;
            width: 350px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
        }

        .id-display {
            background: var(--panel);
            padding: 10px;
            margin: 15px 0;
            border: 1px dashed var(--glow);
            text-align: center;
            cursor: pointer;
            word-break: break-all;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="hud-header">
    <div class="status-tag"><div class="pulse"></div> encrypted link: <span id="link-status">waiting</span></div>
    <div id="connection-controls">
        <button onclick="toggleOverlay()">COMM SETTINGS</button>
    </div>
</div>

<div class="chat-container" id="chat-box">
    <div class="message">
        <div class="msg-meta">SYSTEM</div>
        <div class="msg-text">JARVIS V3.1: Ожидание установки протокола связи...</div>
    </div>
</div>

<div class="input-area">
    <input type="text" id="msg-input" placeholder="Введите пакет данных..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button onclick="sendMsg()">Send</button>
</div>

<div class="connection-overlay" id="overlay">
    <h3 style="margin-top:0">NETWORK ADAPTER</h3>
    <p style="font-size: 11px">ВАШ ПЕРСОНАЛЬНЫЙ ID (нажми, чтобы скопировать):</p>
    <div class="id-display" id="my-id" onclick="copyId()">Генерация...</div>
    
    <p style="font-size: 11px">ПОДКЛЮЧИТЬСЯ К УДАЛЕННОМУ УЗЛУ:</p>
    <input type="text" id="peer-id-input" placeholder="ID друга" style="width: 100%; margin-bottom: 15px;">
    <button onclick="connectToPeer()" style="width: 100%; padding: 10px;">Establish Link</button>
    <br><br>
    <button onclick="toggleOverlay()" class="own" style="width: 100%; background: transparent; color: var(--glow); border: 1px solid var(--border)">Закрыть</button>
</div>

<script>
    const peer = new Peer();
    let conn = null;

    // Звуки (синтетические)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(freq, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // Инициализация Peer
    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
        beep(400, 0.1);
    });

    peer.on('connection', (c) => {
        conn = c;
        setupConnection();
    });

    function connectToPeer() {
        const remoteId = document.getElementById('peer-id-input').value;
        if (!remoteId) return;
        conn = peer.connect(remoteId);
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('link-status').innerText = "Established";
            document.getElementById('overlay').classList.add('hidden');
            addMessage("SYSTEM", "Канал связи защищен. Начинайте обмен данными.", false);
            beep(800, 0.2);
        });

        conn.on('data', data => {
            addMessage("REMOTE USER", data, false);
            beep(600, 0.1);
        });

        conn.on('close', () => {
            document.getElementById('link-status').innerText = "Lost";
            addMessage("SYSTEM", "Связь разорвана.", false);
        });
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text || !conn) return;

        conn.send(text);
        addMessage("YOU", text, true);
        input.value = "";
        beep(1000, 0.05);
    }

    function addMessage(sender, text, isOwn) {
        const box = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isOwn ? 'own' : ''}`;
        
        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        meta.innerText = `${sender} | ${new Date().toLocaleTimeString()}`;
        
        const content = document.createElement('div');
        content.className = 'msg-text';
        
        msgDiv.appendChild(meta);
        msgDiv.appendChild(content);
        box.appendChild(msgDiv);

        // Эффект расшифровки текста
        decodeEffect(content, text);
        
        box.scrollTop = box.scrollHeight;
    }

    function decodeEffect(el, finalArea) {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        let iterations = 0;
        const interval = setInterval(() => {
            el.innerText = finalArea.split("")
                .map((char, index) => {
                    if (index < iterations) return finalArea[index];
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join("");
            
            if (iterations >= finalArea.length) clearInterval(interval);
            iterations += 1/3;
        }, 30);
    }

    function toggleOverlay() {
        document.getElementById('overlay').classList.toggle('hidden');
    }

    function copyId() {
        const id = document.getElementById('my-id').innerText;
        navigator.clipboard.writeText(id);
        alert("ID скопирован в буфер обмена");
    }
</script>
</body>
</html>
