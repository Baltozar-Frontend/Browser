<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VOXEL CORE V5 | Cross-Platform</title>
    <style>
        :root { --btn-size: 60px; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; user-select: none; }
        #game-canvas { position: absolute; inset: 0; }
        
        /* Прицел */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; border-top: 2px solid white; border-left: 2px solid white; width: 10px; height: 10px; transform: translate(-50%, -50%) rotate(45deg); }

        /* UI */
        #ui-layer { position: absolute; inset: 0; z-index: 20; pointer-events: none; }
        #health-bar { position: absolute; top: 20px; left: 20px; font-size: 24px; pointer-events: none; }
        #mp-status { position: absolute; top: 20px; right: 20px; color: white; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; }

        /* Мобильное управление */
        .mobile-only { display: none; }
        @media (pointer: coarse) { .mobile-only { display: block; } }

        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; }
        #joystick-base { width: 100%; height: 100%; background: rgba(255,255,255,0.2); border-radius: 50%; position: relative; }
        #joystick-stick { width: 40px; height: 40px; background: white; border-radius: 50%; position: absolute; top: 40px; left: 40px; }
        .action-btn { position: absolute; width: var(--btn-size); height: var(--btn-size); background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; color: white; font-size: 24px; }
        #btn-jump { bottom: 40px; right: 40px; }

        /* Инвентарь */
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 10px; pointer-events: auto; }
        .slot { width: 40px; height: 40px; border: 2px solid #555; border-radius: 5px; cursor: pointer; }
        .slot.active { border-color: #fff; transform: scale(1.1); }

        /* Меню */
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; gap: 20px; }
        input, button { padding: 15px; font-size: 18px; border-radius: 8px; border: none; width: 250px; text-align: center; }
        button { background: #007aff; color: white; font-weight: bold; cursor: pointer; }
        .hint { font-size: 12px; color: #aaa; text-align: center; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="menu">
        <h2>VOXEL ONLINE V5</h2>
        <input type="text" id="room-id" placeholder="Номер комнаты (напр. 777)">
        <button onclick="connectToRoom()">ВОЙТИ В МИР</button>
        <p class="hint">ПК: W,A,S,D + Мышь + Пробел<br>Моб: Джойстик + Кнопки</p>
    </div>

    <div id="game-canvas"></div>
    <div id="crosshair"></div>
    <div id="ui-layer" style="display: none;">
        <div id="health-bar">❤️❤️❤️❤️❤️</div>
        <div id="mp-status">Одиночная игра</div>
        <div id="joystick-zone" class="mobile-only"><div id="joystick-base"><div id="joystick-stick"></div></div></div>
        <div id="btn-jump" class="action-btn mobile-only">⬆️</div>
        <div id="hotbar">
            <div class="slot active" style="background: #4CAF50" onclick="setSlot(0)"></div>
            <div class="slot" style="background: #654321" onclick="setSlot(1)"></div>
            <div class="slot" style="background: #808080" onclick="setSlot(2)"></div>
        </div>
    </div>

    <script>
        // --- ДВИЖОК ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: false});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-canvas').appendChild(renderer.domElement);

        const player = new THREE.Group();
        const pitch = new THREE.Group();
        player.add(pitch);
        pitch.add(camera);
        pitch.position.y = 1.6;
        player.position.set(0, 10, 0);
        scene.add(player);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

        // Блоки
        const blocks = [];
        const world = new Map();
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const mats = [new THREE.MeshLambertMaterial({color: 0x4CAF50}), new THREE.MeshLambertMaterial({color: 0x654321}), new THREE.MeshLambertMaterial({color: 0x808080})];
        let currentMat = 0;

        function addBlock(x, y, z, mIdx, sync=true) {
            const key = `${x},${y},${z}`;
            if(world.has(key)) return;
            const b = new THREE.Mesh(boxGeo, mats[mIdx]);
            b.position.set(x, y, z);
            scene.add(b);
            blocks.push(b);
            world.set(key, b);
            if(sync && dataConn) dataConn.send({t:'p', x, y, z, m:mIdx});
        }

        function delBlock(obj, sync=true) {
            const key = `${obj.position.x},${obj.position.y},${obj.position.z}`;
            world.delete(key);
            scene.remove(obj);
            blocks.splice(blocks.indexOf(obj), 1);
            if(sync && dataConn) dataConn.send({t:'d', x:obj.position.x, y:obj.position.y, z:obj.position.z});
        }

        for(let x=-8; x<8; x++) for(let z=-8; z<8; z++) addBlock(x, 0, z, 0, false);

        // --- СЕТЬ ---
        let peer, dataConn, remotePlayer;
        function connectToRoom() {
            const id = document.getElementById('room-id').value || "lobby";
            peer = new Peer('vxc-room-' + id);
            
            peer.on('open', () => {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'block';
                document.getElementById('mp-status').innerText = "Комната: " + id;
                startLoop();
            });

            peer.on('connection', conn => {
                dataConn = conn;
                setupConn();
            });

            peer.on('error', () => { // Если ID занят, пробуем подключиться к нему
                const otherPeer = new Peer();
                otherPeer.on('open', () => {
                    dataConn = otherPeer.connect('vxc-room-' + id);
                    setupConn();
                });
            });
        }

        function setupConn() {
            dataConn.on('data', d => {
                if(d.t === 'pos') {
                    if(!remotePlayer) {
                        remotePlayer = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.6), new THREE.MeshBasicMaterial({color: 0xff0000}));
                        scene.add(remotePlayer);
                    }
                    remotePlayer.position.set(d.x, d.y, d.z);
                }
                if(d.t === 'p') addBlock(d.x, d.y, d.z, d.m, false);
                if(d.t === 'd') {
                    const key = `${d.x},${d.y},${d.z}`;
                    if(world.has(key)) delBlock(world.get(key), false);
                }
            });
        }

        // --- УПРАВЛЕНИЕ ---
        let keys = {}, move = {x:0, z:0};
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        // Mouse ПК
        document.addEventListener('mousedown', e => {
            if(document.pointerLockElement !== renderer.domElement) {
                renderer.domElement.requestPointerLock();
                return;
            }
            const ray = new THREE.Raycaster();
            ray.setFromCamera({x:0, y:0}, camera);
            const hits = ray.intersectObjects(blocks);
            if(hits.length > 0 && hits[0].distance < 6) {
                if(e.button === 0) delBlock(hits[0].object);
                if(e.button === 2) {
                    const p = hits[0].object.position.clone().add(hits[0].face.normal);
                    addBlock(p.x, p.y, p.z, currentMat);
                }
            }
        });

        document.addEventListener('mousemove', e => {
            if(document.pointerLockElement === renderer.domElement) {
                player.rotation.y -= e.movementX * 0.002;
                pitch.rotation.x -= e.movementY * 0.002;
                pitch.rotation.x = Math.max(-1.5, Math.min(1.5, pitch.rotation.x));
            }
        });

        // --- ФИЗИКА И ЦИКЛ ---
        let vy = 0;
        function startLoop() {
            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const dt = Math.min(clock.getDelta(), 0.1);

                // Движение ПК
                let dx = 0, dz = 0;
                if(keys['KeyW']) dz -= 1; if(keys['KeyS']) dz += 1;
                if(keys['KeyA']) dx -= 1; if(keys['KeyD']) dx += 1;
                
                // Гравитация и прыжок
                vy -= 20 * dt;
                player.position.y += vy * dt;
                
                if(player.position.y < 1.5) { 
                    player.position.y = 1.5; vy = 0; 
                    if(keys['Space']) vy = 8;
                }

                const moveDir = new THREE.Vector3(dx, 0, dz).normalize().applyEuler(player.rotation);
                player.position.add(moveDir.multiplyScalar(5 * dt));

                if(dataConn && dataConn.open) {
                    dataConn.send({t:'pos', x:player.position.x, y:player.position.y, z:player.position.z});
                }

                renderer.render(scene, camera);
            }
            animate();
        }

        window.setSlot = (i) => {
            currentMat = i;
            document.querySelectorAll('.slot').forEach((s, idx) => s.className = idx===i ? 'slot active' : 'slot');
        }
        
        window.oncontextmenu = (e) => e.preventDefault(); // Отключить меню на правую кнопку
    </script>
</body>
</html>
